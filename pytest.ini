[pytest]
# Pytest configuration for VaaNI integration tests

minversion = 7.0
addopts =
    -ra
    -q
    --strict-markers
    --tb=short
    -v

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: Integration tests (require services running)
    slow: Slow-running tests
    requires_gpu: Tests requiring GPU acceleration
    unit: Unit tests (no external dependencies)

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (optional)
# addopts = --cov=gateway --cov=voice_service --cov=llm_service --cov-report=html
